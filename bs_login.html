<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body class="bg-light d-flex justify-content-center align-items-center" style="min-height:100vh;">
  <div class="card p-4 shadow" style="width:320px;">
    <h2 class="text-center mb-4">Login</h2>

    <div class="mb-2">
      <label class="form-label">Username</label>
      <input type="text" class="form-control" id="u" placeholder="Enter username"/>
      <div class="invalid-feedback">Min 3 characters required.</div>
    </div>
    <div class="mb-2">
      <label class="form-label">Email</label>
      <input type="email" class="form-control" id="e" placeholder="Enter email"/>
      <div class="invalid-feedback">Enter a valid email.</div>
    </div>
    <div class="mb-3">
      <label class="form-label">Password</label>
      <input type="password" class="form-control" id="p" placeholder="Enter password"/>
      <div class="invalid-feedback">Min 6 characters required.</div>
    </div>

    <button class="btn btn-primary w-100" onclick="go()">Login</button>
    <p class="text-center mt-3 mb-0" style="font-size:13px;">No account? <a href="bs_register.html">Register</a></p>
  </div>
  <script>
    function chk(id, cond) {
      document.getElementById(id).classList.toggle('is-valid', cond);
      document.getElementById(id).classList.toggle('is-invalid', !cond);
      return cond;
    }
    function go() {
      const ok = [
        chk('u', document.getElementById('u').value.trim().length >= 3),
        chk('e', /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(document.getElementById('e').value)),
        chk('p', document.getElementById('p').value.length >= 6)
      ];
      if (ok.every(Boolean)) alert('Login successful!');
    }
  </script>
</body>
</html>
