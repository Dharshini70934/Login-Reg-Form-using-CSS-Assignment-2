<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Register</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body class="bg-light py-4">
  <div class="card shadow mx-auto p-4" style="max-width:420px;">
    <h2 class="text-center mb-4">Student Registration</h2>

    <div class="mb-2">
      <label class="form-label">Roll No.</label>
      <input type="text" class="form-control" id="roll" placeholder="e.g. 2024CSE001"/>
      <div class="invalid-feedback">Roll number is required.</div>
    </div>
    <div class="mb-2">
      <label class="form-label">Full Name</label>
      <input type="text" class="form-control" id="name" placeholder="Enter full name"/>
      <div class="invalid-feedback">Name must be letters only.</div>
    </div>
    <div class="mb-2">
      <label class="form-label">Date of Birth</label>
      <input type="date" class="form-control" id="dob"/>
      <div class="invalid-feedback">Enter a valid past date.</div>
    </div>
    <div class="mb-2">
      <label class="form-label">Mobile No.</label>
      <input type="tel" class="form-control" id="mob" placeholder="10-digit number" maxlength="10"/>
      <div class="invalid-feedback">Enter valid 10-digit number.</div>
    </div>
    <div class="mb-2">
      <label class="form-label">Email</label>
      <input type="email" class="form-control" id="email" placeholder="student@example.com"/>
      <div class="invalid-feedback">Enter a valid email.</div>
    </div>
    <div class="mb-2">
      <label class="form-label">Password</label>
      <input type="password" class="form-control" id="pass" placeholder="Min 6 characters"/>
      <div class="invalid-feedback">Min 6 characters required.</div>
    </div>
    <div class="mb-2">
      <label class="form-label">Gender</label>
      <select class="form-select" id="gender">
        <option value="">-- Select Gender --</option>
        <option>Male</option><option>Female</option><option>Other</option>
      </select>
      <div class="invalid-feedback">Please select gender.</div>
    </div>
    <div class="mb-3">
      <label class="form-label">Course</label>
      <select class="form-select" id="course">
        <option value="">-- Select Course --</option>
        <option>B.Tech</option><option>M.Tech</option><option>BCA</option><option>MCA</option>
      </select>
      <div class="invalid-feedback">Please select a course.</div>
    </div>

    <button class="btn btn-primary w-100" onclick="go()">Register</button>
    <p class="text-center mt-3 mb-0" style="font-size:13px;">Already registered? <a href="bs_login.html">Login</a></p>
  </div>
  <script>
    function chk(id, cond) {
      document.getElementById(id).classList.toggle('is-valid', cond);
      document.getElementById(id).classList.toggle('is-invalid', !cond);
      return cond;
    }
    function v(id) { return document.getElementById(id).value; }
    function go() {
      const ok = [
        chk('roll',   v('roll').trim() !== ''),
        chk('name',   /^[a-zA-Z\s]{2,}$/.test(v('name').trim())),
        chk('dob',    v('dob') !== '' && new Date(v('dob')) < new Date()),
        chk('mob',    /^\d{10}$/.test(v('mob'))),
        chk('email',  /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v('email'))),
        chk('pass',   v('pass').length >= 6),
        chk('gender', v('gender') !== ''),
        chk('course', v('course') !== '')
      ];
      if (ok.every(Boolean)) alert('Registration successful!');
    }
  </script>
</body>
</html>
